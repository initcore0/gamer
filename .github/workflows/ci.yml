name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — build in public, scan everything
      # Run the OSS gitleaks CLI directly. The gitleaks-action wrapper requires a
      # license key when its (rate-limited, unauthenticated) org lookup fails,
      # which made this job flaky-fail with no scan run at all.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git --config .gitleaks.toml --redact --exit-code 1 .

  lint-type-test:
    name: lint · type · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.21"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: mypy (type check)
        run: uv run mypy

      - name: pytest (unit — no live APIs)
        run: uv run pytest -m "not integration"
